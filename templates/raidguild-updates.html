<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ .Campaign.Subject }}</title>
  </head>
  <body style="margin:0;background:#141312;color:#f6efe2;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#141312;">
      <tr>
        <td align="center" style="padding:28px 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:680px;">
            <tr>
              <td style="padding:0 0 22px;">
                <a href="https://portal.raidguild.org" style="color:#d7a846;text-decoration:none;">
                  <img src="https://www.brand.raidguild.org/assets/logos/full-m500.svg" alt="RaidGuild" width="180" style="display:block;border:0;max-width:180px;height:auto;" />
                </a>
              </td>
            </tr>
            <tr>
              <td style="background:#1d1b19;border:1px solid #3b3328;padding:34px 28px;">
                {{ template "content" . }}
              </td>
            </tr>
            <tr>
              <td style="padding:22px 0 0;color:#b8ad9b;font-size:13px;line-height:1.6;">
                <p style="margin:0 0 10px;">
                  Sent by RaidGuild.
                  <a href="{{ MessageURL }}" style="color:#d7a846;">View in browser</a>.
                </p>
                <p style="margin:0;">
                  <a href="{{ UnsubscribeURL }}" style="color:#d7a846;">Manage preferences or unsubscribe</a>.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
    {{ TrackView }}
  </body>
</html>
